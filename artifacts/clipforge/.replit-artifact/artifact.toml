kind = "web"
previewPath = "/"
title = "ClipForge"
version = "1.0.0"
id = "artifacts/clipforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26058

[services.development]
run = "pnpm --filter @workspace/clipforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clipforge", "run", "build" ]
publicDir = "artifacts/clipforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26058"
BASE_PATH = "/"
